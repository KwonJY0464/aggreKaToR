<style>
    /* 뉴스 카드 내 레이아웃 수정 */
    .news-item {
        display: flex; gap: 12px; padding: 15px;
        border-bottom: 1px solid var(--border);
        cursor: pointer; transition: 0.2s;
    }
    .news-item:hover { background: rgba(0,0,0,0.05); }
    
    .thumbnail {
        width: 80px; height: 60px; flex-shrink: 0;
        background: #eee; border-radius: 4px;
        overflow: hidden; display: flex; align-items: center; justify-content: center;
    }
    .thumbnail img { width: 100%; height: 100%; object-fit: cover; }
    
    .news-content { flex-grow: 1; }
    .news-content h3 { font-size: 0.95rem; margin: 0 0 5px 0; color: var(--accent); }
    .news-content p { font-size: 0.85rem; margin: 0; line-height: 1.4; color: var(--text); }
    .news-content span { font-size: 0.7rem; color: #999; margin-top: 5px; display: block; }
</style>

<script>
    function renderNews(targetId, items) {
        const container = document.getElementById(targetId);
        container.innerHTML = items.map(item => {
            // 네이버 API는 이미지를 안 주므로, 뉴스 아이콘이나 로고로 대체 표시 예시
            const thumbImg = `https://via.placeholder.com/80x60/0056b3/ffffff?text=NEWS`; 
            
            return `
            <div class="news-item" onclick="window.open('${item.link}', '_blank')">
                <div class="thumbnail"><img src="${thumbImg}" alt="news"></div>
                <div class="news-content">
                    <h3>${item.title.replace(/<[^>]*>?/gm, '')}</h3>
                    <p>${item.ai_summary}</p>
                    <span>${item.pubDate}</span>
                </div>
            </div>
        `}).join('');
    }
</script>
