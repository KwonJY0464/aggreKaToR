<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aggreKaToR</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">
    <header>
        <h1>aggreKaToR</h1>
        <div class="mode-tabs">
            <span id="mode-news" class="mode-btn active" onclick="switchMode('news')">뉴스수집기</span>
            <span id="mode-assembly" class="mode-btn" onclick="switchMode('assembly')">국회수집기</span>
        </div>
        <button style="background:none; border:none; font-size:1.2rem; cursor:pointer;" onclick="toggleTheme()" id="themeIcon">🌙</button>
    </header>

    <div class="wrapper" id="mainWrapper">
        <div class="pane-left">
            <div class="pane" id="news-left-pane" style="display:flex; height:100%; flex-direction:column;">
                <div class="pane-header"><div id="pane1-title">인기뉴스</div> <span id="time-1-news"></span></div>
                <div id="pane1-content" class="scroll-content"></div>
            </div>

            <div id="assembly-left-pane" style="display:none; height:100%; flex-direction:column; gap:15px;">
                <div class="pane" style="height: auto; flex-shrink: 0;">
                    <div id="calendar-wrapper" style="padding:5px 15px 15px 15px;"></div>
                </div>
                <div class="pane" style="flex: 1; min-height: 0;">
                    <div class="pane-header"><div>핵심 의사일정 상세</div> <span id="time-1-assembly"></span></div>
                    <div id="pane1-assembly-content" class="scroll-content">
                        <div style="padding:40px; text-align:center; color:#999;">날짜를 선택해주세요.</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="resizer" id="resizer"></div>
        
        <div class="pane-right">
            <div class="pane">
                <div class="pane-header"><div id="pane2-title">부처/기관 <span id="pane2-tabs"></span></div><span id="time-2"></span></div>
                <div id="pane2-content" class="scroll-content"></div>
            </div>
            <div class="pane">
                <div class="pane-header"><div id="pane3-title">AI 분석 브리핑 <span id="pane3-tabs"></span></div><span id="time-3"></span></div>
                <div id="pane3-content" class="scroll-content"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
