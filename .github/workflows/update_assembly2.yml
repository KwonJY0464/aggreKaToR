name: Update Assembly 2 Data

on:
  schedule:
    # 한국 시간(KST) 기준 매일 오전 9시 ~ 오후 9시 사이 매시간 정각 실행
    # (UTC 기준 00:00 ~ 12:00)
    - cron: '0 0-12 * * *'
  workflow_dispatch:
    # 💡 이 설정으로 인해 'Run workflow' 수동 실행 버튼이 생깁니다.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Assembly Update Script
        env:
          # 사령관님이 설정하신 시크릿 이름을 여기에 매핑합니다.
          ASSEMBLY_API_KEY: ${{ secrets.ASSEMBLY_API_KEY }}
        run: python update_assembly2.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 생성된 assembly_ktr.json 파일이 있을 경우에만 커밋
          git add assembly_ktr.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update assembly data (KST $(date +'%Y-%m-%d %H:%M:%S'))" && git push)
