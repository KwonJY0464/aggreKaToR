name: Update Assembly Profile DB

on:
  workflow_dispatch: # 오직 수동으로만 작동

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests
      - name: Run Profile Update Script
        env:
          ASSEMBLY_API_KEY: ${{ secrets.ASSEMBLY_API_KEY }}
        run: python update_profiles.py
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add profiles_db.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "✅ [수동 가동] 프로필 DB 갱신" && git push)
