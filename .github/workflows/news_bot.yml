name: News Dashboard Bot

on:
  schedule:
    - cron: '*/30 * * * *' # 30분마다 실행
  workflow_dispatch:      # 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Run Scraper
        env:
          NAVID: ${{ secrets.NAVID }}
          NAVPASS: ${{ secrets.NAVPASS }}
        run: python update_news.py
      - name: Commit and Push
        run: |
          git config --global user.name "KTR-News-Bot"
          git config --global user.email "bot@github.com"
          git add news.json
          git commit -m "Auto-update news (30min)" || exit 0
          git pull --rebase origin main   # 💡 교통사고 방지용 코드 (충돌 해결)
          git push
