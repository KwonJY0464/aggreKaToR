name: News Dashboard Bot

on:
  schedule:
    # 💡 월~금, 한국 시간(KST) 오전 8시 ~ 오후 9시까지만 30분마다 작동
    # UTC 기준으로는 23시(전날) ~ 12시입니다.
    - cron: '*/30 23,0-12 * * 1-5'
  workflow_dispatch: # 이건 수동 버튼이니 그대로 두세요!

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - name: Set up Python

        uses: actions/setup-python@v4

        with:

          python-version: '3.10'

      - name: Install dependencies

        run: pip install requests google-genai

      - name: Run Scraper

        env:

          NAVID: ${{ secrets.NAVID }}

          NAVPASS: ${{ secrets.NAVPASS }}

          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

        run: python update_news.py

      - name: Commit and Push

        run: |

          git config --global user.name "KTR-News-Bot"

          git config --global user.email "bot@github.com"

          git add news.json

          git commit -m "Auto-update with AI summary" || exit 0

          git pull --rebase origin main

          git push
