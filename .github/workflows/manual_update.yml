name: 🚀 Manual Radar DB Update

on:
  # 이 줄이 바로 깃허브 웹사이트에 [Run workflow] 버튼을 만들어주는 핵심 트리거입니다.
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 사령관님의 깃허브 저장소를 서버로 불러옵니다.
      - name: 📥 저장소 체크아웃
        uses: actions/checkout@v4

      # 2. 파이썬 환경을 세팅합니다.
      - name: 🐍 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 국회 API 통신에 필요한 패키지를 설치합니다.
      - name: 📦 필요 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 4. 첫 번째 정찰대 출격: 사진/프로필 원본 추출 (NAAS_PIC 100% 매칭)
      - name: 📸 1차 타격 - 프로필 DB 갱신
        env:
          ASSEMBLY_API_KEY: ${{ secrets.ASSEMBLY_API_KEY }}
        run: python update_profiles.py

      # 5. 두 번째 정찰대 출격: 본회의 투표 및 의안 데이터 수집
      - name: 🗳️ 2차 타격 - 레이더 DB 갱신
        env:
          ASSEMBLY_API_KEY: ${{ secrets.ASSEMBLY_API_KEY }}
        run: python update_radar.py

      # 6. 생성된 2개의 JSON 파일을 깃허브에 자동 커밋 & 푸시
      - name: 📤 최신 데이터 깃허브 업로드
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add profiles_db.json radar_db.json
          git commit -m "✅ [수동 가동] 22대 국회 사진 및 표결 DB 최신화 완료" || echo "변경된 데이터가 없습니다."
          git push
