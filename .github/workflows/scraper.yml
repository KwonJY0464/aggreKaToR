name: Update Calendar Data

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    
env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
    - name: 1. 저장소 코드 불러오기
      uses: actions/checkout@v4

    - name: 2. 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 필요한 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-generativeai

    - name: 4. 파이썬 크롤링 & AI 분석 스크립트 실행
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python update_calendar.py

    - name: 5. 변경된 일정(events.json)을 저장소에 자동 커밋 및 푸시
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add events.json
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update KIAT calendar data"
        git push
